name: ci
on:
  push:
  pull_request:

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: python -m pip install --upgrade pip
      - run: pip install -r requirements.txt
      - run: python -c "import pandas, numpy, requests; print('env ok')"
      - run: python -c "import importlib; importlib.import_module('backend.main'); print('api imports ok')"
